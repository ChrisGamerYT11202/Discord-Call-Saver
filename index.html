<!DOCTYPE html>
<html>
<head>
    <title>Discord Call Saver Dashboard</title>
</head>
<body>
    <h1>Discord Call Saver Dashboard</h1>
    <h3>Voice Channel Users</h3>
    <div id="users"></div>

    <input type="text" id="ttsInput" placeholder="Say something...">
    <button id="ttsButton">Play TTS</button>

    <script>
        const { ipcRenderer } = require('electron');

        const ttsButton = document.getElementById('ttsButton');
        const ttsInput = document.getElementById('ttsInput');

        ttsButton.onclick = () => {
            ipcRenderer.send('tts-command', ttsInput.value);
            ttsInput.value = '';
        };
    </script>
</body>
</html>
