<!DOCTYPE html>
<html>
<head>
  <title>Discord Bot Control</title>
</head>
<body>
  <h1>Discord Bot Dashboard</h1>

  <button onclick="api.send('join')">Join VC</button>
  <button onclick="api.send('leave')">Leave VC</button>
  <br><br>

  <input id="sayInput" placeholder="Message"/>
  <button onclick="api.send('say ' + document.getElementById('sayInput').value)">Say</button>
  <button onclick="api.send('tts ' + document.getElementById('sayInput').value)">TTS</button>
  <br><br>

  <input id="mentionInput" placeholder="UserID"/>
  <input id="mentionMsg" placeholder="Message"/>
  <button onclick="api.send('mention ' + document.getElementById('mentionInput').value + ' ' + document.getElementById('mentionMsg').value)">Mention</button>
  <br><br>

  <input id="roleUser" placeholder="UserID"/>
  <input id="roleId" placeholder="RoleID"/>
  <button onclick="api.send('addrole ' + document.getElementById('roleUser').value + ' ' + document.getElementById('roleId').value)">Add Role</button>
  <button onclick="api.send('removerole ' + document.getElementById('roleUser').value + ' ' + document.getElementById('roleId').value)">Remove Role</button>
  <br><br>

  <input id="unbanUser" placeholder="UserID"/>
  <button onclick="api.send('unban ' + document.getElementById('unbanUser').value)">Unban</button>
  <br><br>

  <textarea id="log" rows="15" cols="80" readonly></textarea>

  <script>
    window.api.onLog(msg => {
      const logArea = document.getElementById('log');
      logArea.value += msg + "\n";
      logArea.scrollTop = logArea.scrollHeight;
    });
  </script>
</body>
</html>
